name: employee_management
description: Employee Management System - Flutter App integrated with SAP CSV & Next.js backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.2
  table_calendar: ^3.0.9
  flutter_animate: ^4.5.0

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # Network & Storage
  dio: ^5.4.1
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # Auth & Security
  flutter_secure_storage: ^9.0.0
  jwt_decoder: ^2.0.1

  # File & PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  file_picker: ^8.0.3
  open_file: ^3.3.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^6.0.1
  permission_handler: ^11.3.0
  image_picker: ^1.0.7

  # HTTP client
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
